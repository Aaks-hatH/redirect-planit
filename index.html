<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirecting — PlanIt</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-base: #05050f;
    --bg-surface: #0a0a14;
    --border: #1c1c26;
    --text: #f5f5f5;
    --muted: #737373;
    --accent: #ffffff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: var(--bg-base);
  }
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
    color: var(--text);
    background-image: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.05), transparent 60%);
  }
  .card {
    width: 90%;
    max-width: 420px;
    padding: 3rem 2.5rem;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    text-align: center;
    animation: fadeIn 0.5s ease-out;
  }
  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.05rem;
    letter-spacing: -0.02em;
    color: var(--text);
    margin-bottom: 2.25rem;
  }
  .logo span {
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-weight: 400;
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    margin-left: 0.4rem;
    text-transform: uppercase;
    vertical-align: middle;
  }
  .spinner {
    width: 34px;
    height: 34px;
    margin: 0 auto 1.75rem;
    border-radius: 50%;
    border: 2px solid var(--border);
    border-top-color: var(--text);
    animation: spin 0.9s linear infinite;
  }
  h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1.3rem;
    letter-spacing: -0.02em;
    margin-bottom: 0.6rem;
  }
  p {
    font-size: 0.85rem;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 2rem;
  }
  .url {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.55rem 0.75rem;
    margin-bottom: 1.75rem;
    word-break: break-all;
  }
  a.button {
    display: inline-block;
    width: 100%;
    padding: 0.8rem 1.5rem;
    background: var(--text);
    color: #05050f;
    text-decoration: none;
    border-radius: 10px;
    font-weight: 600;
    font-size: 0.85rem;
    transition: opacity 0.15s ease;
  }
  a.button:hover { opacity: 0.85; }
  .footer {
    margin-top: 1.75rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: #3f3f46;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
<script>
  setTimeout(() => {
    window.location.href = "https://planitapp.onrender.com";
  }, 3000);
</script>
</head>
<body>
  <div class="card">
    <div class="logo">PLANIT<span>Redirect</span></div>
    <div class="spinner"></div>
    <h1>You're being redirected</h1>
    <p>This link now points to our current platform. Taking you there now.</p>
    <div class="url">planitapp.onrender.com</div>
    <a class="button" href="https://planitapp.onrender.com">Continue to PlanIt</a>
    <div class="footer">PlanIt · Event Operations</div>
  </div>
</body>
</html>
